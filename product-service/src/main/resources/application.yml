spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:product}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        transaction:
          coordinator_class: jdbc
        format_sql: true
        use_sql_comments: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
